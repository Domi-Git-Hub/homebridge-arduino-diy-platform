<VirtualHost *:8181>
    ServerName arduino-diy.local
    DocumentRoot /var/www/arduino-diy-server/public

    <Directory /var/www/arduino-diy-server/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/arduino-diy-error.log
    CustomLog ${APACHE_LOG_DIR}/arduino-diy-access.log combined
</VirtualHost>
